<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>

<body>
    <div class="bg-gray-200 min-h-screen flex justify-center items-center animate__animated animate__fadeIn">
        <div class="p-8 w-4/12 bg-white rounded-xl flex flex-col items-center gap-8 animate__animated animate__pulse">
            <div class="flex items-center gap-2">
                <i class="ri-contrast-2-fill text-5xl text-violet-700"></i>
                <h1 class="text-3xl font-semibold">Filemoon</h1>
            </div>
            <form class="w-full space-y-6" onsubmit="login(event)">
                <div class="space-y-1">
                    <label class="text-gray-500 text-[17px] block">Email</label>
                    <input class="p-3  rounded border border-gray-300 w-full" name="email" placeholder="Email" required
                        type="email" />
                </div>
                <div class="space-y-1">
                    <label class="text-gray-500 text-[17px] block">Password</label>
                    <input class="p-3  rounded border border-gray-300 w-full" name="password" placeholder="password"
                        required type="password" />
                </div>
                <button class="p-3  rounded bg-violet-500 w-full text-white font-medium hover:bg-violet-600">Sign
                    in</button>
            </form>
            <div class="flex items-center gap-2">
                <p class="text-gray-500">Don't have a account ?</p>
                <a href="./signup.html" class="text-blue-500 font-medium">Signup</a>
            </div>
        </div>
    </div>
    <script src="js/env.js"></script>
    <script src="js/session.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
